<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f78166"/>
      <stop offset="100%" style="stop-color:#79c0ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f78166;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#79c0ff;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Glow blob left -->
  <circle cx="200" cy="160" r="180" fill="#f78166" opacity="0.08" filter="url(#blur)"/>
  <!-- Glow blob right -->
  <circle cx="1100" cy="160" r="180" fill="#79c0ff" opacity="0.08" filter="url(#blur)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#30363d" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- Top border accent line -->
  <rect width="1280" height="2" fill="url(#accent)" opacity="0.8"/>
  <!-- Bottom border accent line -->
  <rect y="318" width="1280" height="2" fill="url(#accent)" opacity="0.8"/>

  <!-- Logo hexagon -->
  <g transform="translate(490, 130)">
    <polygon points="35,0 70,20 70,60 35,80 0,60 0,20" fill="none" stroke="#f78166" stroke-width="2" opacity="0.9"/>
    <polygon points="35,8 62,23 62,57 35,72 8,57 8,23" fill="#f78166" opacity="0.12"/>
    <text x="35" y="52" font-family="JetBrains Mono, monospace" font-size="30" font-weight="700" fill="#f78166" text-anchor="middle">V</text>
  </g>

  <!-- Main title -->
  <text x="640" y="155" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#e6edf3" text-anchor="middle" letter-spacing="-1">Vertex Field Mapper</text>

  <!-- Subtitle -->
  <text x="640" y="195" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#8b949e" text-anchor="middle">Automatic web page reconnaissance for Playwright automation</text>

  <!-- Tags row -->
  <g transform="translate(380, 225)">
    <!-- Tag 1 -->
    <rect width="110" height="26" rx="13" fill="#f78166" opacity="0.15"/>
    <rect width="110" height="26" rx="13" fill="none" stroke="#f78166" stroke-width="1" opacity="0.5"/>
    <text x="55" y="17" font-family="JetBrains Mono, monospace" font-size="11" fill="#f78166" text-anchor="middle">DataTables</text>

    <!-- Tag 2 -->
    <rect x="120" width="90" height="26" rx="13" fill="#79c0ff" opacity="0.12"/>
    <rect x="120" width="90" height="26" rx="13" fill="none" stroke="#79c0ff" stroke-width="1" opacity="0.5"/>
    <text x="165" y="17" font-family="JetBrains Mono, monospace" font-size="11" fill="#79c0ff" text-anchor="middle">AG Grid</text>

    <!-- Tag 3 -->
    <rect x="220" width="90" height="26" rx="13" fill="#56d364" opacity="0.12"/>
    <rect x="220" width="90" height="26" rx="13" fill="none" stroke="#56d364" stroke-width="1" opacity="0.5"/>
    <text x="265" y="17" font-family="JetBrains Mono, monospace" font-size="11" fill="#56d364" text-anchor="middle">Tabulator</text>

    <!-- Tag 4 -->
    <rect x="320" width="90" height="26" rx="13" fill="#b392f0" opacity="0.12"/>
    <rect x="320" width="90" height="26" rx="13" fill="none" stroke="#b392f0" stroke-width="1" opacity="0.5"/>
    <text x="365" y="17" font-family="JetBrains Mono, monospace" font-size="11" fill="#b392f0" text-anchor="middle">Kendo UI</text>

    <!-- Tag 5 -->
    <rect x="420" width="120" height="26" rx="13" fill="#e3b341" opacity="0.12"/>
    <rect x="420" width="120" height="26" rx="13" fill="none" stroke="#e3b341" stroke-width="1" opacity="0.5"/>
    <text x="480" y="17" font-family="JetBrains Mono, monospace" font-size="11" fill="#e3b341" text-anchor="middle">Handsontable</text>
  </g>

  <!-- Dots decorativos -->
  <circle cx="100" cy="50" r="2" fill="#f78166" opacity="0.4"/>
  <circle cx="130" cy="70" r="1.5" fill="#79c0ff" opacity="0.3"/>
  <circle cx="80" cy="80" r="1" fill="#56d364" opacity="0.3"/>
  <circle cx="1180" cy="50" r="2" fill="#79c0ff" opacity="0.4"/>
  <circle cx="1150" cy="75" r="1.5" fill="#f78166" opacity="0.3"/>
  <circle cx="1200" cy="85" r="1" fill="#56d364" opacity="0.3"/>
</svg>
